<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Privado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">✦</div>
      <span class="logo-text">Chat Privado</span>
    </div>
    <button class="new-chat-btn" id="newChatBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Novo chat
    </button>
    <div class="chat-list" id="chatList"></div>
  </aside>

  <main class="main">
    <div class="top-bar">
      <button class="sidebar-toggle" id="sidebarToggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="model-badge">Claude · Bedrock</span>
    </div>

    <div class="messages" id="chat">
      <div class="empty-state" id="emptyState">
        <div class="empty-logo">✦</div>
        <h2>Como posso ajudar?</h2>
        <p>Inicie uma conversa. Suas mensagens são salvas automaticamente.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-box">
        <textarea id="input" rows="1" placeholder="Mensagem…"></textarea>
        <button id="sendBtn" title="Enviar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Enter para enviar · Shift+Enter para nova linha</p>
    </div>
  </main>

</div>
<script src="script.js?v=2"></script>
</body>
</html>
